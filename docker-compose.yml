services:
  go:
    build:
      context: .
    container_name: gowatch-go
    ports:
      - '8080:8080'
    volumes:
      - .:/app
      - ./data:/data
    environment:
      - DB_PATH=/data/gowatch.db
      - GO_ENV=development
    depends_on: []
    tty: true

  react:
    build:
      context: ./frontend
    container_name: gowatch-react
    ports:
      - '5173:5173'
    volumes:
      - ./frontend:/app
      - gowatch_node_modules:/app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8080
      - VITE_WS_URL=ws://localhost:8080/ws
    tty: true

volumes:
  gowatch_node_modules:
